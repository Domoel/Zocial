server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Use Docker's embedded DNS resolver so nginx resolves the translation
  # backend hostname per-request rather than at startup. This prevents the
  # container from crashing when TRANSLATE_API points to an unreachable host.
  resolver 127.0.0.11 valid=30s;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location /api/translate {
    set $translate_backend "__TRANSLATE_API__";
    proxy_pass $translate_backend/translate;
    proxy_ssl_server_name on;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /api/detect {
    set $translate_backend "__TRANSLATE_API__";
    proxy_pass $translate_backend/detect;
    proxy_ssl_server_name on;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
