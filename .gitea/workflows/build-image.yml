name: Build and Push Enafore Image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - dev

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: sh

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Generate timestamp
        run: echo "TAG=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Set image tag
        run: |
          if [ "${{ inputs.branch }}" = "dev" ]; then
            echo "IMAGE_TAG=dev" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Build image
        run: |
          docker build \
            -t domoel/enfore:${IMAGE_TAG} \
            -t domoel/enfore:${IMAGE_TAG}-${TAG} \
            .

      - name: Push image
        run: |
          docker push domoel/enfore:${IMAGE_TAG}
          docker push domoel/enfore:${IMAGE_TAG}-${TAG}
