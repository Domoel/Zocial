{#if $isUserLoggedIn}

<div class="community-settings-section">
  <FocusRestoration realm="settings-community">
    <RadioGroup
      id="pinnables"
      length={numPinnable}
      label="{'intl.pinnableTimelines'}">

      <h2 class="community-header community-header-first">
        {'intl.timelines'}
      </h2>

      <PageList label="{'intl.timelines'}">
        {#each staticPinnables as staticPinnable, i}
          <PageListItem
            href={staticPinnable.href}
            label={staticPinnable.label}
            icon={staticPinnable.icon}
            pinnable="true"
            pinIndex={i}
          />
        {/each}
      </PageList>

      {#if $listsSupported !== false}
      <h2 class="community-header">
        {'intl.lists'}
      </h2>

      <PageList label="{'intl.lists'}">
        {#each $lists as list, i}
          <PageListItem
            href="/lists/{list.id}"
            label={list.title}
            icon="#fa-bars"
            pinnable="true"
            pinIndex={staticPinnablesLength + i}
          />
        {/each}
        <PageListActionItem
          label="{'intl.createList'}"
          icon="#fa-plus"
          on:click="onCreateListClicked()"
        />
      </PageList>
      {/if}

    </RadioGroup>

    <div class="instance-settings-section">
      <h2 class="community-header">
        {'intl.instanceSettings'}
      </h2>

      <PageList label="{'intl.instanceSettings'}">
        {#if isLockedAccount}
          <PageListItem
            href="/requests"
            label={followRequestsLabel}
            icon="#fa-user-plus"
          />
        {/if}

        <PageListItem
          href="/muted"
          label="{'intl.mutedUsers'}"
          icon="#fa-volume-off"
        />

        <PageListItem
          href="/blocked"
          label="{'intl.blockedUsers'}"
          icon="#fa-ban"
        />

        <PageListItem
          href="/pinned"
          label="{'intl.pinnedStatuses'}"
          icon="#fa-thumb-tack"
        />

        <PageListItem
          href="/scheduled"
          label="{'intl.scheduledPosts'}"
          icon="#fa-clock"
        />

        <PageListItem
          href="/followed-tags"
          label="{'intl.followedHashtags'}"
          icon="#fa-hashtag"
        />
      </PageList>
    </div>

  </FocusRestoration>
</div>

{/if}

<style>
  .community-settings-section {
    margin-top: 32px;
  }

  .community-header {
    font-size: 23px;
    font-weight: 400;
    line-height: 1.3;
    margin: 32px 0 18px;
  }

  .community-header-first {
    margin-top: 0;
  }

  .instance-settings-section {
    margin-top: 32px;
  }

  :global([href="/followed-tags"] .page-list-item-svg) {
    width: 20px;
    height: 20px;
  }
</style>

<script>
  import { store } from '../../_store/store.js'
  import PageList from '../community/PageList.html'
  import PageListItem from '../community/PageListItem.html'
  import PageListActionItem from '../community/PageListActionItem.html'
  import RadioGroup from '../radio/RadioGroup.html'
  import FocusRestoration from '../FocusRestoration.html'
  import { updateListsForInstance } from '../../_actions/lists.js'
  import { updateFollowRequestCountIfLockedAccount } from '../../_actions/followRequests.js'
  import { formatIntl } from '../../_utils/formatIntl.js'
  import { importShowCreateListDialog } from '../dialog/asyncDialogs/importShowCreateListDialog.js'

  export default {
    async oncreate () {
      const { currentInstance } = this.store.get()

      if (currentInstance) {
        await Promise.all([
          updateListsForInstance(currentInstance),
          updateFollowRequestCountIfLockedAccount(currentInstance)
        ])
      }
    },

    store: () => store,

    components: {
      PageList,
      PageListItem,
      PageListActionItem,
      RadioGroup,
      FocusRestoration
    },

    methods: {
      async onCreateListClicked () {
        const showCreateListDialog = await importShowCreateListDialog()
        await showCreateListDialog()
      }
    },

    computed: {
      isLockedAccount: ({ $currentVerifyCredentials }) =>
        $currentVerifyCredentials &&
        $currentVerifyCredentials.locked,

      followRequestsLabel: ({
        $hasFollowRequests,
        $numberOfFollowRequests
      }) => (
        formatIntl('intl.followRequestsLabel', {
          hasFollowRequests: $hasFollowRequests,
          count: $numberOfFollowRequests
        })
      ),

      listsLength: ({ $lists }) =>
        $lists ? $lists.length : 0,

      staticPinnablesLength: ({ staticPinnables }) =>
        staticPinnables.length,

      numPinnable: ({
        listsLength,
        staticPinnablesLength
      }) => (
        listsLength + staticPinnablesLength
      ),

      staticPinnables: ({ $bubbleTimelineEnabled }) => [
        {
          href: '/local',
          label: 'intl.localTimeline',
          icon: '#fa-users'
        },
        ...($bubbleTimelineEnabled
          ? [{
              href: '/bubble',
              label: 'intl.bubbleTimeline',
              icon: '#fa-circle'
            }]
          : []),
        {
          href: '/federated',
          label: 'intl.federatedTimeline',
          icon: '#fa-globe'
        },
        {
          href: '/favorites',
          label: 'intl.favorites',
          icon: '#fa-star'
        },
        {
          href: '/direct',
          label: 'intl.directMessages',
          icon: '#fa-envelope'
        },
        {
          href: '/bookmarks',
          label: 'intl.bookmarks',
          icon: '#fa-bookmark'
        }
      ]
    }
  }
</script>
