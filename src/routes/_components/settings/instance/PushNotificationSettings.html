<div class="generic-instance-settings">
  {#if pushNotificationsSupport === false}
    <p>{'intl.browserDoesNotSupportPush'}</p>
  {:elseif $notificationPermission === "denied"}
    <p role="alert">{'intl.deniedPush'}</p>
  {/if}
  <form id="push-notification-settings"
        disabled="{!pushNotificationsSupport}"
        ref:form
        aria-label="{'intl.pushSettings'}">
    {#each options as option, i (option.key)}
      {#if i > 0}
        <br>
      {/if}
      <input type="checkbox"
             id="push-notifications-{option.key}"
             name="{option.key}"
             disabled="{!pushNotificationsSupport}"
             on:change="onPushSettingsChange(event)">
      <label for="push-notifications-{option.key}">{option.label}</label>
    {/each}
  </form>
</div>
<GenericInstanceSettingsStyle/>
<style>
  form[disabled="true"] {
    opacity: 0.5;
  }
  p {
    margin: 0 0 10px 0;
  }
</style>
<script>
  import GenericInstanceSettingsStyle from './GenericInstanceSettingsStyle.html'
  import { store } from '../../../_store/store.js'
  import { updatePushSubscriptionForInstance, updateAlerts } from '../../../_actions/pushSubscription.js'
  import { handlePushError } from '../../../_actions/handlePushError.js'
  import { get } from '../../../_utils/lodash-lite.js'
  import { PUSH_ALERT_OPTIONS } from '../../../_static/pushAlerts.js'

  export default {
    async oncreate () {
      const { instanceName, options } = this.get()
      await updatePushSubscriptionForInstance(instanceName)

      const { form } = this.refs
      // The user may have navigated away during the async sync above, destroying this component.
      if (!form) {
        return
      }
      const pushSubscription = this.store.getInstanceData(instanceName, 'pushSubscriptions')
      const hasSubscription = !!pushSubscription
      for (const { key } of options) {
        const saved = get(pushSubscription, ['alerts', key])
        // Reflect reality: with no active push subscription, show every box unchecked so the
        // user can see push is OFF (and ticking a box actually registers a subscription via
        // onPushSettingsChange). Only default to checked once a subscription exists but this
        // particular alert key hasn't been set yet.
        form.elements[key].checked = hasSubscription
          ? (saved === undefined ? true : saved)
          : false
      }
    },
    store: () => store,
    data: () => ({
      options: PUSH_ALERT_OPTIONS
    }),
    computed: {
      pushNotificationsSupport: ({ $pushNotificationsSupport }) => $pushNotificationsSupport
    },
    methods: {
      async onPushSettingsChange (e) {
        const { instanceName, options } = this.get()
        const { form } = this.refs
        const alerts = {}

        for (const { key } of options) {
          alerts[key] = form.elements[key].checked
        }

        try {
          await updateAlerts(instanceName, alerts)
        } catch (err) {
          e.target.checked = !e.target.checked
          await handlePushError(instanceName, err)
        }
      }
    },
    components: {
      GenericInstanceSettingsStyle
    }
  }
</script>
