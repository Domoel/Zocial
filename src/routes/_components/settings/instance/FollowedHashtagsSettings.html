<div class="followed-hashtags-page">
  {#if followedHashtags.length}
    <ul class="hashtag-list">
      {#each followedHashtags as tag (tag.name)}
        <li class="hashtag-list-item">
          <a href="/tags/{tag.name}" rel="prefetch" class="hashtag-link">
            <span class="hashtag-symbol">#</span>{tag.name}
          </a>
          <button type="button" class="unfollow-button" on:click="unfollow(tag.name)" aria-label="Unfollow #{tag.name}">
            {'intl.unfollowLabel'}
          </button>
        </li>
      {/each}
    </ul>
  {:else}
    <p class="no-hashtags">{'intl.noFollowedHashtags'}</p>
  {/if}

  <form class="add-hashtag-form" on:submit="onSubmit(event)">
    <input
      class="add-hashtag-input"
      type="text"
      bind:value=newTag
      placeholder="..."
      aria-label="{'intl.addHashtag'}"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    />
    <button type="submit" class="add-button">{'intl.followLabel'}</button>
  </form>

  {#if errorMessage}
    <p class="hashtag-error">{errorMessage}</p>
  {/if}
</div>
<style>
  .followed-hashtags-page {
    padding: 20px;
    box-sizing: border-box;
  }

  .hashtag-list {
    list-style: none;
    margin: 0 0 20px 0;
    padding: 0;
    border: 1px solid var(--main-border);
    border-radius: 2px;
    box-sizing: border-box;
  }

  .hashtag-list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--main-border);
    box-sizing: border-box;
  }

  .hashtag-list-item:last-child {
    border-bottom: none;
  }

  .hashtag-link {
    font-size: 1.15em;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 2px;
    color: var(--anchor-text);
  }

  .hashtag-link:hover {
    text-decoration: underline;
  }

  .hashtag-symbol {
    color: var(--deemphasized-text-color);
    font-weight: 400;
    margin-inline-end: 1px;
  }

  .unfollow-button {
    font-size: 0.85em;
    padding: 5px 12px;
    background: none;
    border: 1px solid var(--main-border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--deemphasized-text-color);
    white-space: nowrap;
    margin-inline-start: 12px;
  }

  .unfollow-button:hover {
    border-color: var(--anchor-text);
    color: var(--body-text-color);
  }

  p.no-hashtags {
    margin: 0 0 20px 0;
    color: var(--deemphasized-text-color);
    font-style: italic;
  }

  .add-hashtag-form {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .add-hashtag-input {
    flex: 1;
    min-width: 0;
    font-size: 0.85em;
  }

  .add-button {
    font-size: 0.85em;
    font-weight: bold;
    padding: 5px 12px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .hashtag-error {
    margin: 10px 0 0 0;
    color: var(--warning-color);
    font-size: 0.9em;
  }

  @media (max-width: 767px) {
    .followed-hashtags-page {
      padding: 20px 10px;
    }
    .hashtag-list-item {
      padding: 12px 10px;
    }
  }
</style>
<script>
  import { store } from '../../../_store/store.js'
  import { followHashtag, unfollowHashtag, refreshFollowedHashtagsForInstance } from '../../../_actions/followedTags.js'

  export default {
    store: () => store,
    data: () => ({
      newTag: '',
      errorMessage: ''
    }),
    computed: {
      followedHashtags: ({ instanceName, $followedHashtagsForInstance }) =>
        ($followedHashtagsForInstance || []).slice().sort((a, b) => a.name.localeCompare(b.name))
    },
    async oncreate () {
      const { instanceName } = this.get()
      try {
        await refreshFollowedHashtagsForInstance(instanceName)
      } catch (e) { /* silently fail — list stays empty */ }
    },
    methods: {
      async onSubmit (event) {
        event.preventDefault()
        const { newTag, instanceName } = this.get()
        const tag = newTag.trim().replace(/^#/, '').toLowerCase()
        if (!tag) return
        this.set({ errorMessage: '' })
        try {
          await followHashtag(instanceName, tag)
          this.set({ newTag: '' })
        } catch (e) {
          this.set({ errorMessage: e.message || 'intl.error' })
        }
      },
      async unfollow (tagName) {
        const { instanceName } = this.get()
        try {
          await unfollowHashtag(instanceName, tagName)
        } catch (e) {
          this.set({ errorMessage: e.message || 'intl.error' })
        }
      }
    }
  }
</script>
