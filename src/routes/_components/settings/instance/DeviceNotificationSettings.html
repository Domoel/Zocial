<div class="generic-instance-settings device-notifications">
  <label class="setting-group">
    <input type="checkbox" ref:master
           id="device-notifications-master"
           on:change="onMasterChange(event)">
    {'intl.notifyOnThisDevice'}
  </label>

  {#if multipleAccounts}
    <p class="device-notifications-note">{'intl.pushOneAccountPerDevice'}</p>
  {/if}

  {#if otherPushAccount}
    {#if !enabled}
      <p class="device-notifications-note">{activeElsewhereText}</p>
    {/if}
  {/if}

  {#if permissionDenied}
    <p role="alert">{'intl.deniedPush'}</p>
  {/if}

  {#if enabled}
    {#if pushSupported}
      <div class="device-notifications-types">
        <PushNotificationSettings {instanceName} />
      </div>
    {:else}
      <p class="device-notifications-note">{'intl.browserDoesNotSupportPush'}</p>
    {/if}
  {/if}
</div>
<GenericInstanceSettingsStyle/>
<style>
  .device-notifications-types {
    margin: 8px 0 0 24px;
  }
  .device-notifications-note {
    margin: 8px 0 0 24px;
    font-size: 0.9em;
    opacity: 0.7;
  }
</style>
<script>
  import GenericInstanceSettingsStyle from './GenericInstanceSettingsStyle.html'
  import PushNotificationSettings from './PushNotificationSettings.html'
  import { store } from '../../../_store/store.js'
  import { enableOSNotificationsForInstance, disablePushForInstance, otherPushInstances } from '../../../_actions/pushSubscription.js'
  import { handlePushError } from '../../../_actions/handlePushError.js'
  import { importShowTextConfirmationDialog } from '../../../_components/dialog/asyncDialogs/importShowTextConfirmationDialog.js'
  import { formatIntl } from '../../../_utils/formatIntl.js'
  import { toast } from '../../../_components/toast/toast.js'

  export default {
    oncreate () {
      // Reconcile the master checkbox with the actual current state for this instance (a push
      // subscription may already exist from a previous session, or push may already be enabled).
      this.refs.master.checked = this.get().enabled
    },
    store: () => store,
    computed: {
      // "Push notifications are on" — OS notifications are push-only, so this is true when the
      // user wants push (enableDesktopNotifications intent flag) or a Web Push subscription exists.
      enabled: ({ $enableDesktopNotifications, $pushSubscriptions, instanceName }) => (
        !!($enableDesktopNotifications && $enableDesktopNotifications[instanceName]) ||
        !!($pushSubscriptions && $pushSubscriptions[instanceName])
      ),
      pushSupported: ({ $pushNotificationsSupport }) => !!$pushNotificationsSupport,
      permissionDenied: ({ $notificationPermission }) => $notificationPermission === 'denied',
      // OS push is limited to one account per device (one VAPID-keyed subscription per origin) — show
      // the explanatory note only when there's more than one account where a switch could happen.
      multipleAccounts: ({ $loggedInInstancesInOrder }) => !!$loggedInInstancesInOrder && $loggedInInstancesInOrder.length > 1,
      // The other (currently logged-in) account that holds push — single-account model → at most
      // one, or null. The intent flag survives logout, so a logged-out account is excluded.
      otherPushAccount: ({ $enableDesktopNotifications, $loggedInInstances, instanceName }) => {
        if (!$enableDesktopNotifications) {
          return null
        }
        const others = Object.keys($enableDesktopNotifications).filter(
          name => name !== instanceName && $enableDesktopNotifications[name] &&
            $loggedInInstances && $loggedInInstances[name]
        )
        return others.length ? others[0] : null
      },
      activeElsewhereText: ({ otherPushAccount }) => (
        otherPushAccount ? formatIntl('intl.pushActiveForOtherAccount', { account: otherPushAccount }) : ''
      )
    },
    methods: {
      async onMasterChange (event) {
        const { instanceName } = this.get()

        if (!event.target.checked) {
          // Turn push off for THIS instance: clear its intent flag and unsubscribe from Web Push.
          this.store.setInstanceData(instanceName, 'enableDesktopNotifications', false)
          this.store.save()
          /* no await */ disablePushForInstance(instanceName)
          return
        }

        // Turning on. Revert the checkbox until we actually succeed — permission may be denied, push
        // may fail, or the user may cancel the switch dialog below.
        event.target.checked = false

        // Single-account model: if another account currently holds push, confirm before re-keying
        // the one shared browser subscription to this account.
        const others = otherPushInstances(instanceName)
        if (others.length) {
          const showTextConfirmationDialog = await importShowTextConfirmationDialog()
          showTextConfirmationDialog({
            title: 'intl.pushSwitchTitle',
            text: formatIntl('intl.pushSwitchText', { from: others[0], to: instanceName }),
            positiveText: 'intl.pushSwitchConfirm',
            negativeText: 'intl.cancel'
          }).on('positive', () => {
            /* no await */ this.switchPushToThisAccount(instanceName, others)
          })
          return
        }

        await this.enablePushForThisAccount(instanceName, null)
      },

      async switchPushToThisAccount (instanceName, others) {
        // Disable the previous push account(s) first (backend unsubscribe + clear flag), then re-key
        // the shared subscription to this account.
        for (const other of others) {
          await disablePushForInstance(other)
        }
        await this.enablePushForThisAccount(instanceName, others[0])
      },

      async enablePushForThisAccount (instanceName, displaced) {
        let result
        try {
          result = await enableOSNotificationsForInstance(instanceName)
        } catch (err) {
          await handlePushError(instanceName, err)
          return
        }
        const { permission, pushError, pushUnsupported } = result
        if (permission === 'unsupported') {
          alert('intl.desktopNotificationsNotSupported')
          return
        }
        if (permission === 'denied') {
          alert('intl.desktopNotificationsBlocked')
          return
        }
        if (permission !== 'granted') {
          return // 'default' — user dismissed the permission prompt; leave off
        }
        if (pushUnsupported) {
          // Browser can't do Web Push; OS notifications are push-only, so there's nothing to turn
          // on. Leave the toggle off and explain.
          alert('intl.browserDoesNotSupportPush')
          return
        }
        if (pushError) {
          // Push-only: a failed registration must NOT leave the toggle showing "on". Surface the
          // error (re-auth on 403) and keep it off so the user can retry.
          await handlePushError(instanceName, pushError)
          return
        }

        if (this.refs.master) {
          this.refs.master.checked = true
        }
        if (displaced) {
          /* no await */ toast.say(formatIntl('intl.pushMovedToast', { from: displaced, to: instanceName }))
        }
      }
    },
    components: {
      GenericInstanceSettingsStyle,
      PushNotificationSettings
    }
  }
</script>
