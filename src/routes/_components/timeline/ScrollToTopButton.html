<div class="scroll-top-wrapper {visible ? 'visible' : ''}">
  <div class="scroll-top-halo">
    <button class="primary scroll-top-button"
            aria-label="{label}"
            title="{label}"
            on:click="scrollToTop()">
      <SvgIcon className="scroll-top-svg" href="#fa-angle-up" />
    </button>
  </div>
</div>
<style>
  /* Sticks to the top of the viewport (within the content column, like the compose FAB) but
     takes no layout space so it floats over the content. */
  .scroll-top-wrapper {
    position: -webkit-sticky;
    position: sticky;
    top: var(--fab-gap-top);
    z-index: 5000;
    height: 0;
    display: flex;
    justify-content: flex-end;
    pointer-events: none;
  }
  /* hidden until the threshold element has scrolled past the top; fade in/out */
  .scroll-top-halo {
    border-radius: 9px;
    margin: 5px 15px 15px 5px;
    background-color: var(--compose-button-halo);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s linear;
  }
  .scroll-top-wrapper.visible .scroll-top-halo {
    opacity: 1;
    pointer-events: auto;
  }
  .scroll-top-button {
    position: relative;
    margin: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  :global(.scroll-top-svg) {
    width: 24px;
    height: 24px;
    fill: var(--button-primary-text);
  }

  @media (max-width: 767px) {
    .scroll-top-halo {
      margin: 5px;
    }
  }
</style>
<script>
  import SvgIcon from '../SvgIcon.html'
  import { store } from '../../_store/store.js'
  import { smoothScroll } from '../../_utils/smoothScroll.js'
  import { getScrollContainer, addScrollListener, removeScrollListener } from '../../_utils/scrollContainer.js'

  export default {
    oncreate () {
      this._onScroll = this._onScroll.bind(this)
      addScrollListener(this._onScroll)
      // initial check: a page may already be scrolled past the threshold (e.g. threads open at the
      // focused post), so we evaluate visibility right away rather than waiting for a scroll event
      this._update()
    },
    ondestroy () {
      removeScrollListener(this._onScroll)
      if (this._raf) {
        cancelAnimationFrame(this._raf)
      }
    },
    store: () => store,
    data: () => ({
      visible: false,
      // CSS selector of the element whose disappearance above the viewport top reveals the button.
      // Threads: the first (root) post. Profiles: the posting-stats summary.
      thresholdSelector: '.status-article',
      label: ''
    }),
    methods: {
      _onScroll () {
        if (this._raf) {
          return
        }
        this._raf = requestAnimationFrame(() => {
          this._raf = null
          this._update()
        })
      },
      _update () {
        // Show once the threshold element's bottom has scrolled above the top of the viewport.
        const el = document.querySelector(this.get().thresholdSelector)
        const visible = !!el && el.getBoundingClientRect().bottom <= 0
        if (this.get().visible !== visible) {
          this.set({ visible })
        }
      },
      scrollToTop () {
        smoothScroll(getScrollContainer(), 0, false, true)
      }
    },
    components: {
      SvgIcon
    }
  }
</script>
