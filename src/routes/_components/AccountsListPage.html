<div class="accounts-page">
  {#if loading}
    <LoadingPage />
  {:elseif accounts && accounts.length}
    <ul class="accounts-results">
      {#each accounts as account}
        <AccountSearchResult
          {account}
          actions={accountActions}
          manageFollow={manageFollows}
          relationship={relationships[account.id]}
          {verifyCredentials}
          on:click="onClickAction(event)"
        />
      {/each}
    </ul>
    {#if hasMore}
      <button type="button" class="accounts-load-more" on:click="loadMore()" disabled={loadingMore}>
        {loadingMore ? 'intl.loading' : 'intl.loadMore'}
      </button>
    {/if}
  {:else}
    <!-- Loaded but nothing to show. A genuinely empty result, or a backend that doesn't expose
         this list (e.g. GoToSocial returns an empty social graph for accounts other than your
         own). Show a message instead of a blank page so it's clear the page isn't broken. -->
    <p class="accounts-empty">{'intl.nothingToShow'}</p>
  {/if}
</div>
<style>
  .accounts-empty {
    padding: 30px 10px;
    text-align: center;
    font-size: 1.1em;
    color: var(--deemphasized-text-color);
  }
  .accounts-page {
    padding: 20px 20px;
    position: relative;
  }
  .accounts-results {
    list-style: none;
    box-sizing: border-box;
    border: 1px solid var(--main-border);
    border-radius: 2px;
  }
  .accounts-load-more {
    display: block;
    width: 100%;
    margin-top: 15px;
    padding: 10px;
    font-size: 0.9em;
    border: 1px solid var(--main-border);
    border-radius: 4px;
    background: none;
    cursor: pointer;
    color: var(--anchor-text);
  }
  .accounts-load-more:hover {
    border-color: var(--anchor-text);
  }
  .accounts-load-more[disabled] {
    opacity: 0.6;
    cursor: default;
  }
  @media (max-width: 767px) {
    .accounts-page {
      padding: 20px 10px;
    }
  }
</style>
<script>
  import { store } from '../_store/store.js'
  import LoadingPage from './LoadingPage.html'
  import AccountSearchResult from './search/AccountSearchResult.html'
  import { toast } from './toast/toast.js'
  import { on } from '../_utils/eventBus.ts'
  import { formatIntl } from '../_utils/formatIntl.js'
  import { getRelationships } from '../_api/relationships.js'

  // Fetchers may return either a plain array (no pagination) or { accounts, nextMaxId }
  // (paginated, "load more"). This keeps older callers working unchanged.
  export default {
    async oncreate () {
      try {
        await this.refreshAccounts()
      } catch (e) {
        /* no await */ toast.say(formatIntl('intl.error', { error: (e.message || '') }))
      } finally {
        this.set({ loading: false })
      }
      on('refreshAccountsList', this, () => this.refreshAccounts())
    },
    data: () => ({
      loading: true,
      loadingMore: false,
      accounts: [],
      nextMaxId: null,
      paginated: false,
      accountActions: undefined,
      // manageFollows: render a follow/unfollow button + "⋯" menu per row (Follows list).
      manageFollows: false,
      // assumeFollowing: seed each row as "following" before the real relationships load, so the
      // own Follows list shows "Unfollow" instantly with no flash. Only correct for your own list.
      assumeFollowing: false,
      relationships: {}
    }),
    computed: {
      hasMore: ({ paginated, nextMaxId }) => paginated && !!nextMaxId,
      verifyCredentials: ({ $currentVerifyCredentials }) => $currentVerifyCredentials
    },
    store: () => store,
    components: {
      LoadingPage,
      AccountSearchResult
    },
    methods: {
      onClickAction (event) {
        const { action, accountId } = event
        action.onclick(accountId)
      },
      async refreshAccounts () {
        const { accountsFetcher } = this.get()
        const result = await accountsFetcher()
        if (Array.isArray(result)) {
          this.set({ accounts: result, paginated: false, nextMaxId: null })
          this.primeRelationships(result)
        } else {
          this.set({ accounts: result.accounts, paginated: true, nextMaxId: result.nextMaxId })
          this.primeRelationships(result.accounts)
        }
      },
      // For the manageable Follows list, get each row's relationship so the follow button + "⋯"
      // menu are accurate. On your own list we optimistically seed "following: true" first (no
      // flash of "Follow"), then refine with the real relationships for an accurate options menu.
      primeRelationships (accts) {
        const { manageFollows, assumeFollowing } = this.get()
        if (!manageFollows || !accts || !accts.length) {
          return
        }
        if (assumeFollowing) {
          const seeded = Object.assign({}, this.get().relationships)
          for (const a of accts) {
            if (!seeded[a.id]) {
              seeded[a.id] = { id: a.id, following: true }
            }
          }
          this.set({ relationships: seeded })
        }
        const { currentInstance, accessToken } = this.store.get()
        getRelationships(currentInstance, accessToken, accts.map(a => a.id))
          .then(rels => {
            const map = Object.assign({}, this.get().relationships)
            for (const r of rels) {
              map[r.id] = r
            }
            this.set({ relationships: map })
          })
          .catch(e => console.warn('failed to load relationships for accounts list', (e && e.message) || e))
      },
      async loadMore () {
        const { accountsFetcher, accounts, nextMaxId, loadingMore } = this.get()
        if (loadingMore || !nextMaxId) {
          return
        }
        this.set({ loadingMore: true })
        try {
          const result = await accountsFetcher(nextMaxId)
          const more = Array.isArray(result) ? result : result.accounts
          const newMaxId = Array.isArray(result) ? null : result.nextMaxId
          this.set({ accounts: accounts.concat(more), nextMaxId: newMaxId, loadingMore: false })
          this.primeRelationships(more)
        } catch (e) {
          this.set({ loadingMore: false })
          /* no await */ toast.say(formatIntl('intl.error', { error: (e.message || '') }))
        }
      }
    }
  }
</script>
