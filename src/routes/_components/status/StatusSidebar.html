<a id={elementId}
   class="status-sidebar size-{size} {isStatusInOwnThread ? 'status-sidebar-focused' : ''} {threadPosition === 'top' ? 'thread-top-line' : ''}"
   rel="prefetch"
   href="/accounts/{originalAccountId}"
   aria-hidden="true"
   tabindex="-1"
>
  <!-- the avatar is duplicated information, so hide from tab order and screenreaders -->
  <Avatar account={originalAccount}
          isLink="true"
          {size} />
</a>
<style>
  .status-sidebar {
    grid-area: sidebar;
    margin-inline-end: 15px;
    width: 24px;
    height: 24px;
    position: relative;
  }

  /* Thread connecting line: starts exactly at the bottom edge of this avatar
     and extends downward. Clipped at the virtual-list-item boundary by
     contain:paint, so it never bleeds into the next item. */
  .status-sidebar.thread-top-line::after {
    content: '';
    position: absolute;
    inset-inline-start: 50%;
    transform: translateX(-50%);
    top: 24px; /* default (extra-small) avatar height */
    width: 4px;
    height: 9999px;
    background: var(--anchor-text);
    opacity: 0.4;
    pointer-events: none;
  }

  .status-sidebar.size-small.thread-top-line::after {
    top: 48px;
  }

  .status-sidebar.size-medium.thread-top-line::after {
    top: 64px;
  }

  .status-sidebar.size-small {
    width: 48px;
    height: 48px;
  }

  .status-sidebar.size-medium {
    width: 64px;
    height: 64px;
  }

  .status-sidebar-focused {
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--anchor-text) 40%, transparent);
    border-radius: 4px;
  }

  @media (max-width: 767px) {
    .status-sidebar {
      margin-inline-end: 5px;
    }
  }
</style>
<script>
  import Avatar from '../Avatar.html'
  export default {
    components: {
      Avatar
    },
    data: () => ({
      threadPosition: null
    }),
    computed: {
      elementId: ({ uuid }) => `status-author-avatar-${uuid}`,
      size: ({ isStatusInOwnThread, $isVeryTinyMobileSize }) => {
        if ($isVeryTinyMobileSize) {
          return isStatusInOwnThread ? 'small' : 'extra-small'
        }
        return isStatusInOwnThread ? 'medium' : 'small'
      }
    }
  }
</script>
