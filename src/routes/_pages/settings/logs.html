<FocusRestoration realm="settings/logs">
  <SettingsNav page="settings/logs" label="{'intl.logs'}" />
  <h1 class="logs-heading">{'intl.logs'}</h1>
  <pre class="logs-banner">{banner}</pre>
  <label class="logs-toggle">
    <input type="checkbox" bind:checked="$showAllLogs">
    {'intl.showAllLogs'}
  </label>
  <p class="logs-hint">{'intl.showAllLogsHint'}</p>
  <div class="logs-actions">
    <button type="button" class="logs-btn" on:click="copyLogs()">{'intl.copyLogs'}</button>
    <button type="button" class="logs-btn" on:click="clearLogs()">{'intl.clearLogs'}</button>
  </div>
  <div class="{$showAllLogs ? '' : 'logs-critical-only'}">
    <easrng-console-logs ref:consoleLogs></easrng-console-logs>
  </div>
</FocusRestoration>
<style>
.logs-heading {
  margin: 0 20px 20px;
}
.logs-banner {
  font-family: monospace;
  white-space: pre;
  margin: 0;
  padding: 16px 20px 4px;
  color: var(--body-text-color);
  overflow-x: auto;
}
.logs-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 20px 4px;
}
.logs-hint {
  margin: 0;
  padding: 0 20px 12px;
  font-size: 0.85em;
  line-height: 1.4;
  color: var(--deemphasized-text-color);
}
.logs-actions {
  display: flex;
  gap: 10px;
  margin: 0 20px 12px;
}
.logs-btn {
  font-size: 0.85em;
  padding: 6px 14px;
  border: 1px solid var(--main-border);
  border-radius: 4px;
  background: none;
  cursor: pointer;
  color: var(--anchor-text);
}
.logs-btn:hover {
  border-color: var(--anchor-text);
}
/* default view: only error/warn lines; the toggle removes this class to show all levels */
:global(.logs-critical-only easrng-console-logs .log:not(.log-error):not(.log-warn)) {
  display: none;
}
:global(easrng-console-logs) {
  font-family: monospace;
  font-size: 1rem;
}
:global(easrng-console-logs *) {
    box-sizing: border-box;
}
:global(easrng-console-logs .message) {
  white-space: pre-wrap;
  flex-shrink: 1;
  flex-grow: 1;
  overflow: hidden;
}
:global(easrng-console-logs .log) {
  display: flex;
  padding: 0.5rem 20px;
  border-top: 1px solid var(--settings-list-item-border);
  position: relative;
  overflow: hidden;
  width: 100%;
}
:global(easrng-console-logs .icon) {
  font-size: 0.75rem;
  line-height: 2;
  margin-inline-end: 0.5rem;
}
:global(easrng-console-logs .log-error) {
  background: color-mix(in srgb, Canvas, #f00 15%);
}
:global(easrng-console-logs .log-warn) {
  background: color-mix(in srgb, Canvas, #fc0 15%);
}
:global(easrng-console-logs .logs) {
  display: block;
  margin: 0;
  padding: 0;
}
:global(easrng-console-logs .log-table .table-wrap) {
  border: 1px solid var(--logs-table-border);
  box-shadow: inset 0 0 0 1px var(--logs-table-border);
  overflow-x: auto;
  max-width: fit-content;
}
:global(easrng-console-logs table) {
    border-collapse: collapse;
}
:global(easrng-console-logs th, easrng-console-logs td) {
    border: 1px solid var(--logs-table-border);
    padding: 0.25rem;
    text-align: start;
}
:global(easrng-console-logs th) {
    font-weight: bold;
}
</style>
<script>
  import SettingsNav from '../../_components/settings/SettingsNav.html'
  import FocusRestoration from '../../_components/FocusRestoration.html'
  import { store } from '../../_store/store.js'
  import { banner, clearLogs as clearLogBuffer } from '../../_utils/console/hook.ts'
  import { toast } from '../../_components/toast/toast.js'
  import '../../_utils/console/element.ts'

  export default {
    store: () => store,
    data: () => ({
      banner
    }),
    methods: {
      async copyLogs () {
        // Copy the rendered log lines so formatting matches what's shown — JSON.stringify
        // can't serialise Error objects (they come out as "{}"), but element.ts already
        // formats errors/%o/tables correctly. offsetParent === null drops lines hidden by
        // the level filter, so this copies exactly what's visible.
        const root = this.refs.consoleLogs
        const lines = root
          ? Array.from(root.querySelectorAll('.log'))
            .filter(el => el.offsetParent !== null)
            .map(el => {
              // build "icon message" on one line (the .log is a flex row, so reading the
              // whole element's innerText would split the icon and message onto two lines)
              const iconEl = el.querySelector('.icon')
              const msgEl = el.querySelector('.message')
              const icon = iconEl ? iconEl.textContent.trim() : ''
              const message = (msgEl ? msgEl.innerText : el.textContent).trim()
              return icon ? `${icon} ${message}` : message
            })
          : []
        // prepend the banner so the paste includes version/build context (handy for support)
        const text = banner + '\n\n' + lines.join('\n')
        try {
          await navigator.clipboard.writeText(text)
          /* no await */ toast.say('intl.logsCopied')
        } catch (e) {
          /* no await */ toast.say('intl.logsCopyFailed')
        }
      },
      clearLogs () {
        clearLogBuffer()
        /* no await */ toast.say('intl.logsCleared')
      }
    },
    components: {
      SettingsNav,
      FocusRestoration
    }
  }
</script>
