<SettingsLayout page='settings/about' label="{'intl.aboutApp'}">
  <div ref:node>
    <h1>{'intl.aboutApp'}</h1>
    {@html 'intl.aboutAppDescription'}
  </div>
</SettingsLayout>
<UISettingsStyles />
<script>
  import SettingsLayout from '../../_components/settings/SettingsLayout.html'
  import UISettingsStyles from '../../_components/settings/UISettingsStyles.html'

  const version = ZOCIAL_VERSION
  const channel = ZOCIAL_CHANNEL

  export default {
    oncreate () {
      for (const node of this.refs.node.querySelectorAll('.zocial-version')) {
        // keep the version number in the monospace <code>, but put the channel right
        // after it as normal text — a monospace space would look too wide otherwise
        node.textContent = version
        node.insertAdjacentText('afterend', ` (${channel})`)
      }
    },
    components: {
      SettingsLayout,
      UISettingsStyles
    }
  }
</script>
