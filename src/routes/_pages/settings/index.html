<SettingsLayout page='settings' label="{'intl.settings'}">
  <h1 class="settings-page-title">
    <SvgIcon className="settings-page-title-icon" href="#fa-gear" />
    <span>{'intl.settings'}</span>
  </h1>

  <h2 class="settings-section-title">
    {'intl.general'}
  </h2>

  <SettingsList>
    <SettingsListRow>
      <SettingsListButton href="/settings/general" label="{'intl.general'}"/>
    </SettingsListRow>
    <SettingsListRow>
      {#if singleInstance}
        <SettingsListButton href="/settings/account" label="{'intl.account'}"/>
      {:else}
        <SettingsListButton href="/settings/instances" label="{'intl.instances'}"/>
      {/if}
    </SettingsListRow>
    <SettingsListRow>
      <SettingsListButton href="/settings/hotkeys" label="{'intl.hotkeys'}"/>
    </SettingsListRow>
    <SettingsListRow>
      <SettingsListButton href="/settings/about" label="{'intl.aboutApp'}"/>
    </SettingsListRow>
    <SettingsListRow>
      <SettingsListButton href="/settings/logs" label="{'intl.logs'}"/>
    </SettingsListRow>
    <SettingsListRow>
      <SettingsListButton href="#" on:click="reload(event)" label="{'intl.reload'}"/>
    </SettingsListRow>
  </SettingsList>

  <CommunitySettingsSection/>
</SettingsLayout>

<style>
  .settings-page-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.15em;
    font-weight: 600;
    line-height: 1.3;
    margin: 0 0 28px;
  }

  :global(.settings-page-title-icon) {
    width: 20px;
    height: 20px;
    flex: 0 0 auto;
    fill: currentColor;
  }

  .settings-section-title {
    font-size: 1.4em;
    font-weight: 400;
    line-height: 1.3;
    margin: 0 0 18px;
  }

  @media (max-width: 767px) {
    .settings-page-title {
      margin-bottom: 24px;
    }

    .settings-section-title {
      font-size: 1.3em;
    }
  }
</style>

<script>
  import SettingsLayout from '../../_components/settings/SettingsLayout.html'
  import SettingsList from '../../_components/settings/SettingsList.html'
  import SettingsListRow from '../../_components/settings/SettingsListRow.html'
  import SettingsListButton from '../../_components/settings/SettingsListButton.html'
  import CommunitySettingsSection from '../../_components/settings/CommunitySettingsSection.html'
  import SvgIcon from '../../_components/SvgIcon.html'

  export default {
    components: {
      SettingsLayout,
      SettingsList,
      SettingsListRow,
      SettingsListButton,
      SvgIcon,
      CommunitySettingsSection
    },
    methods: {
      async reload (event) {
        event.preventDefault()
        try {
          await Promise.all((await navigator.serviceWorker.getRegistrations()).map(e => e.unregister()))
        } catch (e) {
          console.error(e)
        }
        document.location.reload(true)
      }
    },
    data: () => ({
      singleInstance: process.env.SINGLE_INSTANCE
    })
  }
</script>
