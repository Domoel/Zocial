<ScrollToTopButton thresholdSelector=".dynamic-page-banner" label="{'intl.scrollToTop'}" />
<DynamicPageBanner title="{'intl.followers'}" />
<AccountsListPage {accountsFetcher} {expectedCount} />
<script>
  import { getFollowers } from '../../../_api/followsAndFollowers.js'
  import AccountsListPage from '../../../_components/AccountsListPage.html'
  import { store } from '../../../_store/store.js'
  import DynamicPageBanner from '../../../_components/DynamicPageBanner.html'
  import ScrollToTopButton from '../../../_components/timeline/ScrollToTopButton.html'

  export default {
    computed: {
      accountId: ({ params }) => params.accountId,
      // The viewed account's follower count — drives the "list unavailable" vs "nothing here"
      // empty message. Only trust it when the loaded profile matches this page's account.
      expectedCount: ({ $currentAccountProfile, accountId }) => (
        ($currentAccountProfile && $currentAccountProfile.id === accountId) ? $currentAccountProfile.followers_count : null
      ),
      accountsFetcher: ({ $currentInstance, $accessToken, accountId }) => (maxId) => getFollowers($currentInstance, $accessToken, accountId, maxId)
    },
    store: () => store,
    components: {
      AccountsListPage,
      DynamicPageBanner,
      ScrollToTopButton
    }
  }
</script>
