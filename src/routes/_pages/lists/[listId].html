{#if $isUserLoggedIn}
  <TimelinePage timeline="list/{params.listId}">
    {#if $pinnedPage !== `/lists/${params.listId}`}
      <DynamicPageBanner title={listTitle} icon="#fa-bars"/>
    {/if}
  </TimelinePage>
{:else}
  <HiddenFromSSR>
    <FreeTextLayout>
      <h1>{'intl.list'}</h1>

      <p>{'intl.listNotLoggedIn'}</p>
    </FreeTextLayout>
  </HiddenFromSSR>
{/if}
<script>
  import TimelinePage from '../../_components/TimelinePage.html'
  import FreeTextLayout from '../../_components/FreeTextLayout.html'
  import { store } from '../../_store/store.js'
  import HiddenFromSSR from '../../_components/HiddenFromSSR.html'
  import DynamicPageBanner from '../../_components/DynamicPageBanner.html'
  import { createStream } from '../../_actions/stream/streaming.js'
  import { setupTimeline } from '../../_actions/timeline.js'

  export default {
    oncreate () {
      const { params } = this.get()
      const { currentInstance, accessToken, currentInstanceInfo } = this.store.get()
      if (!currentInstance || !accessToken || !currentInstanceInfo) return
      const cfg = currentInstanceInfo.configuration
      const streamingApi = (cfg && cfg.urls && cfg.urls.streaming) ||
        (currentInstanceInfo.urls && currentInstanceInfo.urls.streaming_api)
      if (!streamingApi) return
      const timelineName = `list/${params.listId}`
      const firstStatusId = store.getFirstTimelineItemId(currentInstance, timelineName)
      try {
        this._listStream = createStream(streamingApi, currentInstance, accessToken, timelineName, firstStatusId, null)
      } catch (e) {
        // Backend doesn't support list streaming — periodic poll below covers updates
        console.warn('list streaming not available', e)
      }
      // Poll every 60s as a fallback for backends without list streaming support.
      // The 30s throttle in setupTimeline prevents redundant fetches when streaming
      // is already delivering updates.
      this._pollInterval = setInterval(() => { setupTimeline() }, 60000)
    },
    ondestroy () {
      if (this._listStream) {
        this._listStream.close()
        this._listStream = null
      }
      clearInterval(this._pollInterval)
      this._pollInterval = null
    },
    computed: {
      list: ({ params, $lists }) => $lists && $lists.find(_ => _.id === params.listId),
      listTitle: ({ list }) => list ? list.title : ''
    },
    store: () => store,
    components: {
      TimelinePage,
      FreeTextLayout,
      HiddenFromSSR,
      DynamicPageBanner
    }
  }
</script>
